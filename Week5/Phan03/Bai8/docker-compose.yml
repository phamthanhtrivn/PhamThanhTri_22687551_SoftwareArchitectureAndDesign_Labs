services:
  redis:
    image: redis:7-alpine
    container_name: part3_bai8_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: part3_bai8_web
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    container_name: part3_bai8_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
