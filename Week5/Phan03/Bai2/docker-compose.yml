services:
  mongo:
    image: mongo:latest
    container_name: part3_bai2_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: part3_bai2_node
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: mydb
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mongo_data:
